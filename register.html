<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Operator Profile | RECOIL</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        body {
            display: flex;
            min-height: 100vh;
            background-color: var(--bg-primary);
            padding: 70px 20px 40px;
        }

        .auth-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: auto;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: var(--font-family);
            font-size: 1rem;
            margin-bottom: 15px;
            transition: border-color var(--transition-speed) ease;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--tactical-orange);
            background-color: rgba(255,122,0,0.02);
        }
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 4px;
            font-family: var(--font-family);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all var(--transition-speed) ease;
        }
        .btn-social:hover {
            border-color: var(--tactical-orange);
            color: var(--tactical-orange);
            background: rgba(255,122,0,0.05);
        }
        .auth-link {
            color: var(--tactical-orange);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .auth-link:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
    </style>
</head>
<body>

    <div style="position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; gap: 10px;">
        <button id="theme-toggle" class="icon-btn" title="Toggle Light/Dark Mode">🌓</button>
        <button id="rtl-toggle" class="icon-btn" title="Toggle RTL">⇄</button>
    </div>
    
    <div class="auth-container anim-hud-enter">
        <div class="auth-header">
            <a href="index.html" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none; margin-bottom: 20px;">
                <div class="logo-icon" style="margin-right: 10px;"></div>
                <span class="logo-text" style="font-size: 2.2rem; margin: 0; line-height: 1;">RECOIL</span>
            </a>
            <h2 style="font-size: 2rem;">Sign Up</h2>
            <p class="caption">Create an account to manage your bookings and profile.</p>
        </div>

        <form action="index.html" method="GET">
            <div style="margin-bottom: 15px; text-align: start;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500;">First Name</label>
                <input type="text" class="form-control" placeholder="First Name" required style="margin-bottom: 0;">
            </div>
            <div style="margin-bottom: 15px; text-align: start;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500;">Username</label>
                <input type="text" class="form-control" placeholder="Username" required style="margin-bottom: 0;">
            </div>
            <div style="margin-bottom: 15px; text-align: start;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500;">Email Address</label>
                <input type="email" class="form-control" placeholder="Email Address" required style="margin-bottom: 0;">
            </div>
            <div style="margin-bottom: 20px; text-align: start;">
                <label style="display: block; margin-bottom: 5px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500;">Password</label>
                <div style="position: relative;">
                    <input type="password" class="form-control" placeholder="Password" required style="margin-bottom: 0; padding-inline-end: 45px;">
                    <button type="button" class="toggle-password" style="position: absolute; inset-inline-end: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center;">
                        <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            
            <div style="margin-bottom: 25px; font-size: 0.9rem; color: var(--text-secondary); text-align: start;">
                <label><input type="checkbox" required style="margin-inline-end: 5px;"> I agree to the <a href="#" class="auth-link">Terms of Service and Privacy Policy</a>.</label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
        </form>

        <div class="divider">OR CONTINUE WITH</div>

        <button class="btn-social">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
            Google
        </button>
        <button class="btn-social">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.25.68 2.92.68.74 0 1.87-.8 3.19-.68 1.44.1 2.53.51 3.25 1.5-3.01 1.65-2.3 5.43.5 6.45-.63 1.83-1.44 3.65-2.86 5.02zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" fill="currentColor"/></svg>
            Apple
        </button>

        <p style="text-align: center; margin-top: 25px; color: var(--text-secondary); font-size: 0.9rem;">
            Already have an account? <a href="login.html" class="auth-link">Login</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
